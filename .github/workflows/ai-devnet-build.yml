name: Docker Build - AI Devnet
on:
  workflow_dispatch:
  push:
    branches:
      - ai-devnet
    paths:
      - 'src/**'
      - 'include/**'
      - 'cfg/postfiatd-ai-devnet-*.cfg'
      - 'cfg/validators-ai-devnet.txt'
      - 'cmake/**'
      - 'external/**'
      - 'Builds/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'Dockerfile'
      - 'scripts/docker-entrypoint.sh'
      - 'scripts/logrotate-postfiatd.conf'
jobs:
  build-ai-devnet:
    uses: ./.github/workflows/build.yml
    with:
      network: ai-devnet
      source_ref: ai-devnet
    secrets: inherit
