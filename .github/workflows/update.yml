name: Update Nodes
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to update'
        required: true
        type: choice
        options:
          - devnet
          - testnet
          - ai-devnet
      node_type:
        description: 'Node type to update'
        required: true
        type: choice
        options:
          - validators
          - rpc
          - all
      image_tag:
        description: 'Docker image tag prefix (defaults to network name, use for feature branch deploys)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      validator_hosts: ${{ steps.hosts.outputs.validator_hosts }}
      rpc_hosts: ${{ steps.hosts.outputs.rpc_hosts }}
    steps:
      - name: Set hosts based on network
        id: hosts
        env:
          DEVNET_VALIDATORS: ${{ vars.DEVNET_VALIDATOR_HOSTS }}
          DEVNET_RPC: ${{ vars.DEVNET_RPC_HOSTS }}
          TESTNET_VALIDATORS: ${{ vars.TESTNET_VALIDATOR_HOSTS }}
          TESTNET_RPC: ${{ vars.TESTNET_RPC_HOSTS }}
          AI_DEVNET_VALIDATORS: ${{ vars.AI_DEVNET_VALIDATOR_HOSTS }}
          AI_DEVNET_RPC: ${{ vars.AI_DEVNET_RPC_HOSTS }}
        run: |
          if [ "${{ inputs.network }}" = "devnet" ]; then
            echo "validator_hosts=$DEVNET_VALIDATORS" >> $GITHUB_OUTPUT
            echo "rpc_hosts=$DEVNET_RPC" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.network }}" = "ai-devnet" ]; then
            echo "validator_hosts=$AI_DEVNET_VALIDATORS" >> $GITHUB_OUTPUT
            echo "rpc_hosts=$AI_DEVNET_RPC" >> $GITHUB_OUTPUT
          else
            echo "validator_hosts=$TESTNET_VALIDATORS" >> $GITHUB_OUTPUT
            echo "rpc_hosts=$TESTNET_RPC" >> $GITHUB_OUTPUT
          fi

  update-validator:
    if: ${{ inputs.node_type == 'validators' || inputs.node_type == 'all' }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        host: ${{ fromJson(needs.prepare.outputs.validator_hosts) }}
    steps:
      - name: Update validator ${{ matrix.host }}
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 10
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_TAG
          script: |
            set -e

            cd /opt/postfiatd

            if [ -n "$IMAGE_TAG" ]; then
              NETWORK="$IMAGE_TAG" docker compose pull
              NETWORK="$IMAGE_TAG" docker compose up -d
            else
              docker compose pull
              docker compose up -d
            fi

            echo "Waiting for validator to reach proposing state..."
            TIMEOUT=480
            ELAPSED=0
            INTERVAL=10
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATE=$(docker exec postfiatd postfiatd --conf /etc/postfiatd/postfiatd.cfg server_info 2>/dev/null \
                | grep -o '"server_state"\s*:\s*"[^"]*"' \
                | head -1 \
                | sed 's/.*: *"//;s/"//')
              echo "  ${ELAPSED}s — server_state: ${STATE:-starting}"
              if [ "$STATE" = "proposing" ]; then
                echo "Validator is proposing — healthy"
                exit 0
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "WARNING: Validator did not reach proposing within ${TIMEOUT}s (last state: ${STATE:-unknown})"
            exit 1

  update-rpc:
    if: ${{ always() && !cancelled() && (inputs.node_type == 'rpc' || inputs.node_type == 'all') }}
    needs: [prepare, update-validator]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        host: ${{ fromJson(needs.prepare.outputs.rpc_hosts) }}
    steps:
      - name: Update RPC ${{ matrix.host }}
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 10
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ matrix.host }}
          username: root
          key: ${{ secrets.VULTR_SSH_KEY }}
          command_timeout: 10m
          envs: IMAGE_TAG
          script: |
            set -e

            cd /opt/postfiatd

            if [ -n "$IMAGE_TAG" ]; then
              NETWORK="$IMAGE_TAG" docker compose pull
              NETWORK="$IMAGE_TAG" docker compose up -d
            else
              docker compose pull
              docker compose up -d
            fi

            echo "Waiting for RPC to reach full state..."
            TIMEOUT=480
            ELAPSED=0
            INTERVAL=10
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATE=$(docker exec postfiatd postfiatd --conf /etc/postfiatd/postfiatd.cfg server_info 2>/dev/null \
                | grep -o '"server_state"\s*:\s*"[^"]*"' \
                | head -1 \
                | sed 's/.*: *"//;s/"//')
              echo "  ${ELAPSED}s — server_state: ${STATE:-starting}"
              if [ "$STATE" = "full" ] || [ "$STATE" = "proposing" ]; then
                echo "RPC is $STATE — healthy"
                exit 0
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "WARNING: RPC did not reach full state within ${TIMEOUT}s (last state: ${STATE:-unknown})"
            exit 1
